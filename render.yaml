services:
  - type: web
    name: qualitia-userjourney
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DB_DIR
        value: /var/data
    disk:
      name: journey-data
      mountPath: /var/data
      sizeGB: 1
